name: Daily Fantasy Refresh

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fantasy update pipeline
        run: python update_fantasy.py

      - name: Trigger Apps Script ownership update
        run: |
          body=$(curl -s -L "${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}")
          if echo "$body" | grep -q "Ownership updated"; then
            echo "Apps Script ownership update completed successfully"
          elif echo "$body" | grep -q "Unauthorized"; then
            echo "Apps Script webhook returned Unauthorized — check WEBHOOK_TOKEN"
            exit 1
          else
            echo "Apps Script webhook returned unexpected response:"
            echo "$body"
            exit 1
          fi
