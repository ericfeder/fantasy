name: Scheduler Healthcheck

on:
  schedule:
    - cron: '3,18,33,48 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Print scheduler context
        run: |
          echo "event=${{ github.event_name }}"
          echo "workflow=${{ github.workflow }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "schedule=${{ github.event.schedule }}"
          date -u
