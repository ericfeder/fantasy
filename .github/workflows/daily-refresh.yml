name: Daily Fantasy Refresh

on:
  schedule:
    # 10:30 UTC = 6:30 AM ET (EDT)
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fantasy update pipeline
        run: python update_fantasy.py
